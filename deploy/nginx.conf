server {
    listen 80;
    server_name _;

    # 前端根目录
    root /usr/share/nginx/html;
    index index.html;

    # 静态资源 + Vue Router history fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到 backend:5001
    # 用 resolver + 变量方案避免启动期域名解析失败
    resolver 127.0.0.11 valid=10s;
    set $backend_upstream http://backend:5001;
    location /api/ {
        proxy_pass $backend_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 600s;        # 长超时（AI 流式）
        proxy_send_timeout 600s;
        proxy_buffering off;             # SSE 流式不能缓冲
        proxy_cache off;
    }

    # 健康检查
    location /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
