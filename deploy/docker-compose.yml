version: '3.8'

services:
  backend:
    image: ${REGISTRY}/project-quote/backend:${VERSION}
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - JWT_SECRET_KEY=${JWT_SECRET}
      - SECRET_KEY=${SECRET_KEY}
    configs:
      - backend_config
    secrets:
      - db_password
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        max_attempts: 3
    depends_on:
      db:
        condition: service_healthy
    networks:
      - quote-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/quotations"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ${REGISTRY}/project-quote/frontend:${VERSION}
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
    networks:
      - quote-net

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quote-net

configs:
  backend_config:
    file: ./deploy/backend.env

secrets:
  db_password:
    file: ./deploy/db_password.txt

volumes:
  pgdata:

networks:
  quote-net:
    driver: overlay
