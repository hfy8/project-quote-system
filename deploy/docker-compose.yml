# v17 Docker Compose - 单机版（不用 swarm、不用 replicas）
# 复用现有的远程 PostgreSQL 10.60.100.3
# 用法:
#   cp .env.example .env  # 填入密码
#   docker compose up -d
#   docker compose logs -f

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    image: project-quote-backend:latest
    container_name: quote-backend
    restart: unless-stopped
    environment:
      - ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - UVICORN_WORKERS=${UVICORN_WORKERS:-2}
    volumes:
      - backend_logs:/app/logs   # 日志持久化
    networks:
      - quote-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5001/api/ai/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    image: project-quote-frontend:latest
    container_name: quote-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - quote-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  backend_logs:

networks:
  quote-net:
    driver: bridge
