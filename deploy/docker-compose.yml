# v17 Docker Compose - 单机版
# 自动启动 PostgreSQL + pgvector + 后端 + 前端
# 用法:
#   cp .env.example .env  # 填入密码
#   docker compose up -d
#   docker compose logs -f

services:
  # ============== PostgreSQL + pgvector ==============
  db:
    image: pgvector/pgvector:pg16   # 内置 vector 扩展
    container_name: quote-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-quotation_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=***    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d   # 自动执行 .sql
    ports:
      - "${POSTGRES_PORT_HOST:-5432}:5432"      # 暴露给宿主机（可选）
    networks:
      - quote-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-quotation_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ============== Backend (FastAPI) ==============
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    image: project-quote-backend:latest
    container_name: quote-backend
    restart: unless-stopped
    environment:
      - ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=***      - LLM_MODEL=${LLM_MODEL}
      - MINIMAX_API_KEY=${MINI...Y}
      - DEEPSEEK_API_KEY=${DEEP...Y}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - UVICORN_WORKERS=${UVICORN_WORKERS:-2}
    volumes:
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - quote-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5001/api/ai/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s   # 等待 init_db 完成

  # ============== Frontend (Nginx) ==============
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    image: project-quote-frontend:latest
    container_name: quote-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - quote-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  db_data:          # DB 数据持久化
  backend_logs:     # 后端日志

networks:
  quote-net:
    driver: bridge
