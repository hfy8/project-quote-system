version: '3.8'

services:
  backend:
    image: ${REGISTRY}/project-quote/backend:${VERSION}
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://postgres:Quote2024@db:5432/quotation_db
      - JWT_SECRET_KEY=${JWT_SECRET:-quote-jwt-secret-2024}
      - SECRET_KEY=${SECRET_KEY:-quote-secret-2024}
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        max_attempts: 3
    depends_on:
      db:
        condition: service_healthy
    networks:
      - quote-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/quotations"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ${REGISTRY}/project-quote/frontend:${VERSION}
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
    networks:
      - quote-net

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=quotation_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Quote2024
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quote-net

volumes:
  pgdata:

networks:
  quote-net:
    driver: overlay
